name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call: {}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Use the checked-in .sqlx cache so all steps work without a live DATABASE_URL.
  SQLX_OFFLINE: true

jobs:
  # ── Fast checks (no DB needed) ─────────────────────────────────────────────
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Honour rust-toolchain.toml — keep lockstep with outbox-dispatcher.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88.0"
          components: rustfmt, clippy

      - name: Cache Cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo check
        run: cargo check --workspace --all-targets --all-features

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  # ── Unit tests (no DB needed) ──────────────────────────────────────────────
  test-unit:
    name: Unit & Doc Tests
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      # Honour rust-toolchain.toml — keep lockstep with outbox-dispatcher.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88.0"

      - name: Cache Cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2

      - name: cargo test (lib + unit, all features)
        run: cargo test --workspace --lib --all-features

      - name: cargo test (doctests, all features)
        run: cargo test --workspace --doc --all-features

  # ── Integration tests (real Postgres via testcontainers) ──────────────────
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      # Honour rust-toolchain.toml — keep lockstep with outbox-dispatcher.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88.0"

      - name: Cache Cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2

      # testcontainers pulls the postgres image at runtime — Docker is
      # pre-installed on ubuntu-latest runners.
      - name: cargo test (integration)
        run: cargo test --workspace --test '*'

  # ── sqlx offline cache must match the current query macros ────────────────
  sqlx-cache:
    name: sqlx offline cache up-to-date
    runs-on: ubuntu-latest
    needs: check
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: outbox
          POSTGRES_PASSWORD: outbox
          POSTGRES_DB: outbox_dispatcher
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgres://outbox:outbox@localhost:5432/outbox_dispatcher
    steps:
      - uses: actions/checkout@v4

      # Honour rust-toolchain.toml — keep lockstep with outbox-dispatcher.
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88.0"

      - uses: Swatinem/rust-cache@v2

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --version "^0.8" --no-default-features --features postgres

      - name: Apply schema fixture
        run: psql "$DATABASE_URL" -f tests/fixtures/0001_initial_schema.sql

      - name: Assert .sqlx is up-to-date
        run: cargo sqlx prepare --workspace --check

  # ── Dry-run publish (catches metadata / version-collision issues early) ────
  publish-dry-run:
    name: Publish Dry-run
    runs-on: ubuntu-latest
    needs: [test-unit, test-integration, sqlx-cache]
    steps:
      - uses: actions/checkout@v4

      # Honour rust-toolchain.toml — keep lockstep with outbox-dispatcher.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88.0"

      - name: Cache Cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2

      # outbox-publisher-derive has no sibling deps so a full dry-run works.
      - name: cargo publish --dry-run (outbox-publisher-derive)
        run: cargo publish --dry-run -p outbox-publisher-derive

      # outbox-publisher and outbox-publisher-sqlx declare sibling workspace
      # crates as (optional) dependencies. cargo publish --dry-run resolves
      # every declared dep against the crates.io index — even optional ones —
      # and fails when the sibling hasn't been published yet. No cargo flag
      # bypasses this resolver step (--no-verify and --no-default-features both
      # still trigger it). Build and API correctness for these two crates is
      # fully covered by the check, test-unit, and test-integration jobs above.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call: {}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Use the checked-in .sqlx cache so all steps work without a live DATABASE_URL.
  SQLX_OFFLINE: true

jobs:
  # ── Fast checks (no DB needed) ─────────────────────────────────────────────
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo check
        run: cargo check --workspace --all-targets --all-features

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  # ── Unit tests (no DB needed) ──────────────────────────────────────────────
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2

      - name: cargo test (lib + unit, all features)
        run: cargo test --workspace --lib --all-features

  # ── Integration tests (real Postgres via testcontainers) ──────────────────
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2

      # testcontainers pulls the postgres image at runtime — Docker is
      # pre-installed on ubuntu-latest runners.
      - name: cargo test (integration)
        run: cargo test --workspace --test '*'

  # ── Dry-run publish (catches metadata / version-collision issues early) ────
  publish-dry-run:
    name: Publish Dry-run
    runs-on: ubuntu-latest
    needs: [test-unit, test-integration]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2

      # Publish in dependency order: derive → sqlx adapter → umbrella.
      - name: cargo publish --dry-run (outbox-publisher-derive)
        run: cargo publish --dry-run -p outbox-publisher-derive

      - name: cargo publish --dry-run (outbox-publisher-sqlx)
        run: cargo publish --dry-run -p outbox-publisher-sqlx

      - name: cargo publish --dry-run (outbox-publisher)
        run: cargo publish --dry-run -p outbox-publisher

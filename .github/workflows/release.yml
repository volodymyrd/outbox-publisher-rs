name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  SQLX_OFFLINE: true

jobs:
  # ── Gate: full CI must pass first ─────────────────────────────────────────
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  # ── Publish to crates.io in dependency order ───────────────────────────────
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: ci
    environment: crates-io
    steps:
      - uses: actions/checkout@v4

      # Honour rust-toolchain.toml — keep lockstep with outbox-dispatcher.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88.0"

      - name: Cache Cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2

      # Derive the release version once from the pushed tag; reuse in all
      # index-propagation polls so they keep working across every future release
      # without manual edits.
      - name: Resolve release version from tag
        id: ver
        run: |
          v="${GITHUB_REF#refs/tags/v}"
          echo "version=$v" >> "$GITHUB_OUTPUT"
          # Escape regex metacharacters (dots) for use in grep -E.
          echo "regex=$(printf '%s' "$v" | sed 's/\./\\./g')" >> "$GITHUB_OUTPUT"

      # Dry-run derive first — it has no sibling deps so the crates.io resolver
      # can validate it fully. outbox-publisher and outbox-publisher-sqlx can't
      # be dry-run at this point (their siblings aren't live yet), but they use
      # --no-verify on the real publish which is safe because CI already ran the
      # full test suite.
      - name: cargo publish --dry-run (outbox-publisher-derive)
        run: cargo publish --dry-run -p outbox-publisher-derive

      # Publish in dependency order: derive → umbrella → sqlx adapter.
      # outbox-publisher-sqlx depends on outbox-publisher, so the umbrella crate
      # must reach crates.io first.
      # `--no-verify` is safe here because CI (above) already ran the full
      # test suite including integration tests.
      - name: Publish outbox-publisher-derive
        run: cargo publish -p outbox-publisher-derive --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for outbox-publisher-derive on index
        env:
          REGEX: ${{ steps.ver.outputs.regex }}
        run: |
          for _ in $(seq 1 30); do
            if cargo search outbox-publisher-derive --limit 1 \
                 | grep -Eq "^outbox-publisher-derive = \"${REGEX}\""; then
              exit 0
            fi
            sleep 5
          done
          echo "outbox-publisher-derive did not propagate to the index" >&2
          exit 1

      - name: Publish outbox-publisher
        run: cargo publish -p outbox-publisher --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for outbox-publisher on index
        env:
          REGEX: ${{ steps.ver.outputs.regex }}
        run: |
          for _ in $(seq 1 30); do
            if cargo search outbox-publisher --limit 1 \
                 | grep -Eq "^outbox-publisher = \"${REGEX}\""; then
              exit 0
            fi
            sleep 5
          done
          echo "outbox-publisher did not propagate to the index" >&2
          exit 1

      - name: Publish outbox-publisher-sqlx
        run: cargo publish -p outbox-publisher-sqlx --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ── GitHub Release with changelog ─────────────────────────────────────────
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
